image: node:22

pipelines:
  custom:
    deploy-frontend:
      - step:
          name: Deploy Frontend
          script:
            - echo "Frontend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/frontend &&
                node -v &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                npm ci &&
                chmod +x node_modules/.bin/* &&
                npm run build &&
                sudo rm -rf /var/www/helpdesk/frontend/* &&
                sudo cp -r dist/* /var/www/helpdesk/frontend/ &&
                echo "Frontend deployed successfully to /var/www/helpdesk/frontend"
              '

    deploy-backend:
      - step:
          name: Deploy Backend
          script:
            - echo "Backend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/backend &&
                node -v &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                npm install &&
                chmod +x node_modules/.bin/* &&
                npm run build &&
                pm2 restart Backend
              '
