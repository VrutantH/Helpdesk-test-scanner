image: node:22

pipelines:
  custom:
    deploy-frontend:
      - step:
          name: Deploy Frontend
          script:
            - echo "Frontend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/frontend &&
                node -v &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                npm ci &&
                chmod +x node_modules/.bin/* &&
                npm run build &&
                echo "Cleaning nginx root..." &&
                sudo rm -rf /var/www/helpdesk/frontend &&
                sudo mkdir -p /var/www/helpdesk &&
                sudo mkdir -p /var/www/helpdesk/frontend &&
                echo "Copying files..." &&
                sudo cp -rv dist/* /var/www/helpdesk/frontend/ &&
                sudo chown -R www-data:www-data /var/www/helpdesk/frontend &&
                sudo chmod -R 755 /var/www/helpdesk/frontend &&
                echo "Stopping any PM2 frontend processes..." &&
                pm2 delete Frontend 2>/dev/null || true &&
                pm2 delete frontend 2>/dev/null || true &&
                echo "Reloading nginx..." &&
                sudo nginx -t &&
                sudo systemctl reload nginx &&
                echo "Verifying files..." &&
                ls -la /var/www/helpdesk/frontend/ &&
                head -5 /var/www/helpdesk/frontend/index.html &&
                echo "Frontend deployed successfully!"
              '

    deploy-backend:
      - step:
          name: Deploy Backend
          script:
            - echo "Backend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                set -e &&
                echo "=== Checking environment ===" &&
                node -v &&
                mongo --version || echo "MongoDB CLI not found, checking service..." &&
                sudo systemctl status mongod --no-pager || sudo systemctl status mongodb --no-pager || echo "MongoDB not running as service" &&
                echo "" &&
                echo "=== Pulling latest code ===" &&
                cd /home/ubuntu/helpdesk &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                echo "" &&
                echo "=== Building backend ===" &&
                cd backend &&
                npm ci &&
                chmod +x node_modules/.bin/* || true &&
                npm run build &&
                echo "" &&
                echo "=== Setting up deployment directory ===" &&
                sudo mkdir -p /var/www/helpdesk/backend/uploads &&
                sudo chown -R ubuntu:ubuntu /var/www/helpdesk || sudo chown -R $USER:$USER /var/www/helpdesk &&
                echo "" &&
                echo "=== Copying files ===" &&
                rm -rf /var/www/helpdesk/backend/dist &&
                cp -r dist /var/www/helpdesk/backend/ &&
                cp package*.json /var/www/helpdesk/backend/ &&
                cp ../ecosystem.config.js /var/www/helpdesk/backend/ &&
                echo "" &&
                echo "=== Installing production dependencies ===" &&
                cd /var/www/helpdesk/backend &&
                npm ci --omit=dev &&
                echo "" &&
                echo "=== Starting PM2 ===" &&
                pm2 delete helpdesk-backend 2>/dev/null || true &&
                pm2 delete Backend 2>/dev/null || true &&
                pm2 start ecosystem.config.js &&
                echo "Waiting for backend to start..." &&
                sleep 5 &&
                pm2 save &&
                echo "" &&
                echo "=== PM2 Status ===" &&
                pm2 list &&
                pm2 jlist | grep -o '"status":"[^"]*"' | head -1 &&
                echo "" &&
                echo "=== Recent Logs ===" &&
                pm2 logs helpdesk-backend --lines 30 --nostream &&
                echo "" &&
                echo "=== Health Check ===" &&
                curl -f http://localhost:3003/api/health && echo "✅ Backend is healthy!" || (echo "❌ Health check failed" && pm2 logs helpdesk-backend --err --lines 50 --nostream && exit 1)
              '
