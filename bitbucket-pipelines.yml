image: node:22

pipelines:
  custom:
    deploy-frontend:
      - step:
          name: Deploy Frontend
          script:
            - echo "Frontend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/frontend &&
                node -v &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                npm ci &&
                chmod +x node_modules/.bin/* &&
                echo "Setting production environment variables..." &&
                cp .env.production.build .env &&
                cat .env &&
                npm run build &&
                sudo rm -rf /var/www/helpdesk/frontend/* &&
                sudo cp -r dist/* /var/www/helpdesk/frontend/ &&
                sudo chown -R www-data:www-data /var/www/helpdesk/frontend &&
                sudo chmod -R 755 /var/www/helpdesk/frontend &&
                sudo systemctl reload nginx &&
                echo "Frontend deployed successfully!"
              '

    deploy-backend:
      - step:
          name: Deploy Backend
          script:
            - echo "Backend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/backend &&
                node -v &&
                git checkout dev &&
                git reset --hard origin/dev &&
                git pull &&
                npm ci &&
                chmod +x node_modules/.bin/* &&
                npm run build &&
                sudo cp ../ecosystem.config.js /var/www/helpdesk/backend/ &&
                sudo cp -r dist/* /var/www/helpdesk/backend/ &&
                sudo chown -R ubuntu:ubuntu /var/www/helpdesk/backend &&
                cd /var/www/helpdesk/backend &&
                pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js &&
                pm2 save &&
                echo "Backend deployed successfully!"
              '
