image: node:18

pipelines:
  custom:
    deploy-frontend:
      - step:
          name: Deploy Frontend
          script:
            - echo "Frontend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/frontend &&
                node -v &&
                git checkout dev &&
                git pull &&
                npm install &&
                npm run build &&
                pm2 restart Frontend
              '

    deploy-backend:
      - step:
          name: Deploy Backend
          script:
            - echo "Backend Deployment Started"
            - ssh -v ubuntu@34.14.157.13 '
                cd /home/ubuntu/helpdesk/backend &&
                node -v &&
                git checkout dev &&
                git pull &&
                npm install &&
                npm run build &&
                pm2 restart Backend
              '
