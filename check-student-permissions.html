<!DOCTYPE html>
<html>
<head>
    <title>Check Student Permissions</title>
</head>
<body>
    <h1>Student Token Permissions</h1>
    <pre id="output"></pre>

    <script>
        const token = localStorage.getItem('authToken');
        const output = document.getElementById('output');
        
        if (!token) {
            output.textContent = 'No token found!';
        } else {
            try {
                // Decode JWT (simple base64 decode of payload)
                const parts = token.split('.');
                const payload = JSON.parse(atob(parts[1]));
                
                output.textContent = JSON.stringify(payload, null, 2);
                
                console.log('Full payload:', payload);
                console.log('Role:', payload.role);
                console.log('Permissions:', payload.role?.permissions);
                console.log('Number of permissions:', payload.role?.permissions?.length || 0);
            } catch (e) {
                output.textContent = 'Error decoding token: ' + e.message;
            }
        }
    </script>
</body>
</html>
